# sqlc 配置文件
version: "2"
sql:
  - engine: "mysql"
    queries: "sqlc/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "sqlcdb"
        out: "internal/infra/persistence/sqlc"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
