server:
  port: 8080
  mode: debug  # debug | release | test

database:
  driver: mysql
  dsn: "${DB_USER:root}:${DB_PASSWORD:123456}@tcp(${DB_HOST:127.0.0.1}:${DB_PORT:3306})/${DB_NAME:mengri_flow}?charset=utf8mb4&parseTime=True&loc=Local"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

redis:
  addr: "${REDIS_ADDR:127.0.0.1:6379}"
  password: "${REDIS_PASSWORD:}"
  db: 0

log:
  level: info   # debug | info | warn | error
  format: json  # json | text
